# Railway deployment configuration for ChampMail backend
# Root directory for this service should be set to ./backend in Railway dashboard

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python scripts/migrate.py; uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
